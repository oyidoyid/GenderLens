<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>WordBalance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<div class="page-wrapper">
    <header class="site-header">
        <div class="logo-title">
            <div class="logo-circle">W</div>
            <div>
                <h1>WordBalance</h1>
                <p class="tagline">Gender-Fair Language Detection Tool</p>
            </div>
        </div>

        <nav class="top-nav">
           
            {% if logged_in %}
                <span class="user-info">Logged in as {{ user_email }}</span>
                <a href="{{ url_for('logout') }}" class="btn-link danger">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="btn-link primary">Login with Google</a>
            {% endif %}
        </nav>
    </header>

    <main class="main-content">
        <div class="card">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <small>WordBalance &middot; A gender-fair language detection tool</small>
    </footer>
</div>
</body>
</html>
